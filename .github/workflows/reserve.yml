name: Library Auto Reserve (Alibaba Cloud Triggered)

on:
  repository_dispatch:
    types: [fc-timer-trigger] # 对应阿里云函数计算触发的类型
  workflow_dispatch: # 保留手动触发

jobs:
  reserve:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright
          python -m playwright install chromium

      - name: Run reservation script
        uses: nick-fields/retry@v3
        env:
          LIB_USER: ${{ secrets.LIB_USER }}
          LIB_PASS: ${{ secrets.LIB_PASS }}
          LIB_SEAT_ID: ${{ vars.LIB_SEAT_ID }}
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 60
          # 核心：注意路径和环境变量
          command: |
            export PYTHONPATH=$PYTHONPATH:$(pwd)
            python refresh-all.py